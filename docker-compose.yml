services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ot_soc
      POSTGRES_USER: ot_soc
      POSTGRES_PASSWORD: ot_soc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ot_soc -d ot_soc"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres18-data:/var/lib/postgresql
    ports:
      - "5434:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://ot_soc:ot_soc@db:5432/ot_soc
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: backend,localhost,127.0.0.1
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    command: >
      sh -c "python manage.py migrate
      && python manage.py seed_catalogs
      && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      OT_SOC_API_BASE_URL: http://backend:8000/api
      NEXT_PUBLIC_OT_SOC_API_BASE_URL: http://127.0.0.1:8000/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres18-data:
